services:
  postgres:
    image: postgres:16-alpine
    container_name: finsense-db
    environment:
      POSTGRES_DB: finsense
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - finsense_pgdata:/var/lib/postgresql/data

volumes:
  finsense_pgdata:

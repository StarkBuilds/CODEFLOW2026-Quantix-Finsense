spring.application.name=finsense

# PostgreSQL (override via env for local/docker)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finsense}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:finsense}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:finsense}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flask ML microservice
finsense.ml.base-url=${FINSENSE_ML_BASE_URL:http://localhost:5000}
finsense.ml.classify-timeout=30s

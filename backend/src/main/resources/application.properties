spring.application.name=finsense
spring.config.import=optional:file:.env
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finsense}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Use dev profile for in-memory DB when Postgres is not running:
#   -Dspring.profiles.active=dev
# Or start Postgres: docker compose up -d

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

finsense.ml.base-url=${FINSENSE_ML_BASE_URL:http://localhost:5000}
finsense.ml.classify-timeout=30s
finsense.default-user.email=demo@finsense.local

finsense.jwt.secret=${FINSENSE_JWT_SECRET:finsense-dev-secret-key-minimum-32-chars!!}
finsense.jwt.expiration-ms=86400000
